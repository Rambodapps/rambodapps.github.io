<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rambod Financial | Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--primary); font-weight: 600; }
        
        /* Contact Form Styles */
        .contact-section { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; margin-top: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        footer { text-align: center; padding: 40px; border-top: 1px solid #e2e8f0; margin-top: 50px; }
        .links a { color: #64748b; text-decoration: none; margin: 0 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Contact Rambod Financial</h1>
            <p>Have questions about our apps? Send us a message below.</p>
        </header>

        <div class="contact-section">
            <form action="https://formspree.io/f/your-id" method="POST">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" name="_replyto" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="app-ads.txt">Ad Verification</a>
        </div>
        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 15px;">&copy; 2026 Rambod Financial.</p>
    </footer>

</body>
</html>
